version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mediauto
      POSTGRES_USER: mediauto
      POSTGRES_PASSWORD: mediauto_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediauto"]
      interval: 10s
      timeout: 5s
      retries: 5

  mediauto:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mediauto:mediauto_secure_password@postgres:5432/mediauto
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    restart: unless-stopped

volumes:
  postgres_data:
